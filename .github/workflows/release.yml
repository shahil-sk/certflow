name: Build and Release

# Trigger on semver tags like v1.0 or v1.0.0.
# workflow_dispatch lets you do a test build without pushing a release tag.
on:
  push:
    tags:
      - "v*.*"
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            # PyInstaller on Windows names the binary with .exe automatically
            binary_path: dist/CertWizard.exe
            final_name: CertWizard-windows.exe
            # Windows path separator inside --add-data is a semicolon
            sep: ";"

          - os: ubuntu-22.04
            label: linux
            binary_path: dist/CertWizard
            final_name: CertWizard-linux
            sep: ":"

          - os: macos-latest
            label: macos
            binary_path: dist/CertWizard
            final_name: CertWizard-macos
            sep: ":"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Tkinter ships as a separate system package on Ubuntu.
      # xvfb provides a virtual display so Tk can initialise during
      # PyInstaller's collection phase without a real screen.
      - name: Install system packages (Linux only)
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk xvfb

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Bundle the app into a single self-contained file.
      #
      # --onefile      -- everything packed into one binary, no _internal/ folder
      # --windowed     -- suppresses the console window on Windows/macOS
      # --add-data     -- embeds the fonts dir and the two PDF templates so
      #                   they are accessible at runtime via sys._MEIPASS
      # --hidden-import -- modules that PyInstaller misses via static analysis
      #
      # Note: arialbd.ttf lives in the repo root, not in fonts/, so it needs
      # its own --add-data entry pointing to "."
      - name: Build (Linux — needs xvfb for Tk display)
        if: matrix.label == 'linux'
        run: |
          xvfb-run pyinstaller \
            --onefile \
            --windowed \
            --name CertWizard \
            --add-data "fonts${{ matrix.sep }}fonts" \
            --add-data "arialbd.ttf${{ matrix.sep }}." \
            --add-data "cert_vertical.pdf${{ matrix.sep }}." \
            --add-data "cert_horizontal.pdf${{ matrix.sep }}." \
            --hidden-import pandas \
            --hidden-import openpyxl \
            --hidden-import PyPDF2 \
            --hidden-import reportlab \
            generate.py

      - name: Build (Windows / macOS)
        if: matrix.label != 'linux'
        run: >
          pyinstaller
          --onefile
          --windowed
          --name CertWizard
          "--add-data=fonts${{ matrix.sep }}fonts"
          "--add-data=arialbd.ttf${{ matrix.sep }}."
          "--add-data=cert_vertical.pdf${{ matrix.sep }}."
          "--add-data=cert_horizontal.pdf${{ matrix.sep }}."
          --hidden-import pandas
          --hidden-import openpyxl
          --hidden-import PyPDF2
          --hidden-import reportlab
          generate.py

      # Quick sanity check — bail early if the binary is missing or tiny.
      - name: Verify binary
        shell: bash
        run: |
          if [ ! -f "${{ matrix.binary_path }}" ]; then
            echo "Expected binary not found: ${{ matrix.binary_path }}"
            exit 1
          fi
          SIZE=$(wc -c < "${{ matrix.binary_path }}")
          echo "Binary size: $SIZE bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "Binary is suspiciously small — build likely failed silently"
            exit 1
          fi

      - name: Rename to platform label
        shell: bash
        run: mv "${{ matrix.binary_path }}" "dist/${{ matrix.final_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.final_name }}
          path: dist/${{ matrix.final_name }}
          retention-days: 3

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    # only run this job when a real tag was pushed, not on workflow_dispatch
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      # Make sure none of the three builds silently skipped uploading.
      - name: Confirm all three binaries are present
        run: |
          for f in CertWizard-windows.exe CertWizard-linux CertWizard-macos; do
            if [ ! -f "release-assets/$f" ]; then
              echo "Missing: $f"
              exit 1
            fi
          done
          ls -lh release-assets/

      - name: Resolve tag name
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "CertWizard ${{ steps.tag.outputs.name }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          files: |
            release-assets/CertWizard-windows.exe
            release-assets/CertWizard-linux
            release-assets/CertWizard-macos
